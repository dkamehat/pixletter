<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mailtrack-pf Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #202124;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .logo { font-size: 20px; }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #5f6368;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #1a73e8;
    }
    .toggle-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-field label {
      text-transform: none;
      font-size: 13px;
      color: #202124;
      margin-bottom: 0;
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #dadce0;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider {
      background: #1a73e8;
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
    .btn {
      width: 100%;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn:hover { background: #1557b0; }
    .status {
      font-size: 11px;
      color: #5f6368;
      margin-top: 8px;
      min-height: 16px;
    }
    .status--ok { color: #2e7d32; }
    .status--err { color: #c62828; }
  </style>
</head>
<body>
  <h1><span class="logo">📬</span> mailtrack-pf</h1>

  <div class="field">
    <label>API URL</label>
    <input type="url" id="apiUrl" placeholder="https://mailtrack-pf-api.kame-lift.workers.dev">
  </div>

  <div class="field">
    <label>API Key (optional)</label>
    <input type="text" id="apiKey" placeholder="Bearer token">
  </div>

  <div class="field">
    <label>Slack Webhook URL (optional)</label>
    <input type="url" id="slackWebhookUrl" placeholder="https://hooks.slack.com/...">
  </div>

  <div class="toggle-field">
    <label>Track emails by default</label>
    <label class="switch">
      <input type="checkbox" id="trackByDefault" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-field">
    <label>Show opt-out footer in emails</label>
    <label class="switch">
      <input type="checkbox" id="showOptoutFooter">
      <span class="slider"></span>
    </label>
  </div>

  <button class="btn" id="save">Save Settings</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
