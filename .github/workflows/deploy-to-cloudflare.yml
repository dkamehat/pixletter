# FR-P2-21: "Deploy to Cloudflare" ワンクリックデプロイ
# Fork したユーザーが GitHub Actions Secrets を設定するだけでデプロイできる。
#
# 必要な Secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API Token (Workers + D1 権限)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare Account ID
#   D1_DATABASE_NAME      — D1 database name (default: pixletter-db)

name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      d1_database_name:
        description: 'D1 database name'
        default: 'pixletter-db'
        required: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API + Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create D1 database (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 create ${{ inputs.d1_database_name }} 2>/dev/null || echo "Database already exists"

      - name: Run migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in packages/db/migrations/*.sql; do
            echo "Applying $f..."
            # Remove statement-breakpoint markers
            sed 's/--> statement-breakpoint//g' "$f" > /tmp/migration.sql
            npx wrangler d1 execute ${{ inputs.d1_database_name }} --remote --file=/tmp/migration.sql --config=apps/api/wrangler.toml || true
          done

      - name: Seed self tenant
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute ${{ inputs.d1_database_name }} --remote --config=apps/api/wrangler.toml \
            --command="INSERT OR IGNORE INTO tenants (id, name, plan, monthly_email_limit, reset_at) VALUES ('self', 'Self', 'self', 100000, unixepoch() + 2592000); INSERT OR IGNORE INTO users (id, tenant_id, email, name) VALUES ('self', 'self', 'self@localhost', 'Self User');"

      - name: Deploy API to Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config=apps/api/wrangler.toml

      - name: Build Dashboard
        run: pnpm --filter @pixletter/dashboard build

      - name: Deploy Dashboard to Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy apps/dashboard/dist --project-name=pixletter-dashboard
